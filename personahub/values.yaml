#Replicas
frontend: 1
backend: 1

#Images
fimage:
  repository: sriramk16/vprofile
  pullPolicy: IfNotPresent
  tag: "app"
dimage:
  repository: sriramk16/personahub
  pullPolicy: IfNotPresent
  tag: "db"
imagePullSecrets: []

#lables
flabels:
  app: frontendapp
  env: dev
dlabels:
  app: backenddb
  env: dev
namespace: personahubdev

#contnames
fcontname:
  name: appcont
dcontname:
  name: dbcont

#resources
appresources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"
#{{- toYaml .Values.appresources | nindent 11 }}

dbresources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"


mqresources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "250m"
    memory: "512Mi"

mcresources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "100m"
    memory: "128Mi"

#volumes
dvolumeMounts:
  - name: dbvol
    mountPath: /var/lib/mysql
dvolumes:
  - name: dbvol
    hostPath:
      path: /opt/data

secret:
  dbpass: ZGIxMnBhc3MzNA==

#services
dservice:
  type: ClusterIP
  port: 3306
  targetPort: 3306
fservice:
  type: LoadBalancer
  loadBalancerEnabled: true
fports:
   port: 8080
   nodePort: 30000
   targetPort: 8080

#midtier
mreplicas: 1
mlabels:
  app: mq
  env: dev
mcontname:
  name: mqcont
mimage:
  repository: rabbitmq
  pullPolicy: IfNotPresent
  tag: "4.2"

mports:
  type: ClusterIP
  port: 5672
  targetPort: 5672

mservice:
  name: vpromq01
  type: ClusterIP

#memcached
mcreplicas: 1
mclabels:
  app: mc
mccontname:
  name: mccont
mcimage:
  repository: memcached
  pullPolicy: IfNotPresent
  tag: "1.6"
mcports:
  type: ClusterIP
  port: 11211
  targetPort: 11211
mcservice:
  name: vprocache01
  type: ClusterIP
