apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: personahub
spec:
  destination:
    namespace: personahubdev
    server: https://kubernetes.default.svc
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
  source:
    path: ''
    repoURL: https://kajjayamsriram.github.io/Docker-2-tier-app/
    targetRevision: 0.1.0
    chart: personahub
    helm:
      valueFiles:
        - values.yaml
  sources: []
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
