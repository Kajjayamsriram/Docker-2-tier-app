---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-app
  namespace: {{ .Values.namespace }}
spec:
  {{- if $.Values.fservice.nodePortEnabled }}
  type: {{ .Values.fservice.type }}
  {{- end }}
  selector:
    app: {{ .Values.flabels.app }}
  ports:
{{- range.Values.fports }}
    - port: {{ .port }}
      nodePort: {{ .nodePort }}
      targetPort: {{ .targetPort }}
{{- end }}
