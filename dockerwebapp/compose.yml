version: "3.9"

services:
  app:
    image: sriramk16/vprofile:app
    ports:
      - "8080:8080"

    deploy:
      replicas: 3

      resources:
        limits:
          cpus: "0.35"
          memory: 356M

    networks:
      - appnet
    volumes: 
      - appvol
     
  db:
    image: sriramk16/vprofile:db
    #ports:
    # - "3306:3306"
    
    deploy:
      #replicas: 1
      
      environment:
        MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_rpassword

      secrets:
        - mysql_rpassword

    networks:
      - appnet
    volumes:
      - dbvol


networks:
  appnet:
    driver: overlay

voulmes:
  appvol:
  dbvol:

secrets:
  mysql_rpassword:
    file: ./mysql_rpassword.txt
